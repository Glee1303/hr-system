<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Hệ thống Quản lý Nhân sự</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/shared-styles.css">
    <link rel="stylesheet" href="css/dangnhap.css">
</head>

<body>
    <div class="login-page-wrapper">
        <div class="login-card">
            <div class="login-branding">
                <div class="brand-logo">
                    <i class="fas fa-users-cog"></i>
                </div>
                <h1>HRM Pro</h1>
                <p>Hệ thống Quản trị Nhân sự Toàn diện</p>
            </div>

            <div class="login-body">
                <div class="login-intro">
                    <h2>Đăng nhập hệ thống</h2>
                    <p>Chào mừng bạn quay trở lại. Vui lòng nhập thông tin.</p>
                </div>

                <form class="login-form" id="loginForm" autocomplete="off">
                    <div class="form-group">
                        <label for="username">Tên đăng nhập</label>
                        <div class="input-wrapper">
                            <i class="fas fa-user-circle"></i>
                            <input type="text" id="username" placeholder="Nhập tên đăng nhập" autocomplete="off"
                                required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="password">Mật khẩu</label>
                        <div class="input-wrapper">
                            <i class="fas fa-shield-alt"></i>
                            <input type="password" id="password" placeholder="••••••••" autocomplete="off" required>
                        </div>
                    </div>

                    <div class="form-options">
                        <label class="remember-me">
                            <input type="checkbox"> <span>Ghi nhớ đăng nhập</span>
                        </label>
                        <a href="#" class="forgot-link">Quên mật khẩu?</a>
                    </div>

                    <button type="submit" class="login-btn" id="loginBtn">
                        <span>Truy cập hệ thống</span>
                        <i class="fas fa-arrow-right"></i>
                    </button>
                </form>

                <div class="login-footer">
                    <p>&copy; 2026 HRM Pro Solution. Bảo mật bởi mã hóa SSL.</p>
                </div>
            </div>
        </div>
    </div>

    <script src="js/utils.js"></script>
    <script src="js/api-manager.js"></script>
    <script src="js/pages/dangnhap.js"></script>
</body>

</html>
