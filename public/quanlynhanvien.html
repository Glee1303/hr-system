<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý Nhân Viên - HRM Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/shared-styles.css">
    <link rel="stylesheet" href="css/quanlynhanvien.css">
</head>

<body>
    <div class="app-container">
        <!-- SIDEBAR -->
        <div id="sidebar-container"></div>

        <!-- MAIN CONTENT -->
        <main class="main-content">
            <!-- HEADER -->
            <div id="header-container"></div>

            <!-- PAGE CONTENT -->
            <div class="content-wrapper">
                <!-- Page Title Area -->
                <div class="page-title-section"
                    style="display: flex; justify-content: space-between; align-items: center; max-width: 1200px; margin: 0 auto 2rem;">
                    <div>
                        <h1>Quản lý nhân viên</h1>
                        <p>Quản lý thông tin và hồ sơ của tất cả nhân viên</p>
                    </div>
                    <button class="btn-primary" onclick="toggleAddEmployeeForm()" id="toggleAddEmpBtn">
                        <i class="fas fa-plus"></i> <span id="toggleAddEmpBtnText">Thêm nhân viên</span>
                    </button>
                </div>

                <!-- INLINE ADD EMPLOYEE FORM -->
                <div id="addEmployeeFormContainer" class="form-premium-container" style="display: none;">
                    <div class="form-section">
                        <div class="form-section-title">
                            <i class="fas fa-info-circle"></i>
                            <span>Thông tin cá nhân</span>
                        </div>
                        <div class="form-grid">
                            <div class="portal-form-group">
                                <label>Họ và tên *</label>
                                <input type="text" id="addName" class="portal-input" placeholder="Nhập họ và tên...">
                            </div>
                            <div class="portal-form-group">
                                <label>Email *</label>
                                <input type="email" id="addEmail" class="portal-input"
                                    placeholder="Nhập địa chỉ email...">
                            </div>
                            <div class="portal-form-group">
                                <label>Số điện thoại</label>
                                <input type="tel" id="addPhone" class="portal-input"
                                    placeholder="Nhập số điện thoại...">
                            </div>
                        </div>
                        <div class="portal-form-group" style="margin-top: 1.5rem;">
                            <label>Địa chỉ</label>
                            <textarea id="addAddress" class="portal-textarea" rows="2"
                                placeholder="Nhập địa chỉ liên hệ..."></textarea>
                        </div>
                    </div>

                    <div class="form-section">
                        <div class="form-section-title">
                            <i class="fas fa-briefcase"></i>
                            <span>Thông tin công việc</span>
                        </div>
                        <div class="form-grid">
                            <div class="portal-form-group">
                                <label>Phòng ban</label>
                                <select id="addDept" class="portal-select">
                                    <option value="">-- Chọn phòng ban --</option>
                                </select>
                            </div>
                            <div class="portal-form-group">
                                <label>Chức vụ</label>
                                <input type="text" id="addPosition" class="portal-input" value="Nhân viên" readonly
                                    style="background-color: #f1f5f9; cursor: not-allowed; opacity: 0.8;"
                                    title="Nhân viên mới mặc định là Nhân viên">
                            </div>
                            <div class="portal-form-group">
                                <label>Ngày vào làm</label>
                                <input type="date" id="addStartDate" class="portal-input">
                            </div>
                        </div>
                    </div>

                    <div class="form-section"
                        style="background: #f0f7ff; padding: 1.5rem; border-radius: 1rem; border: 1px dashed #bfdbfe;">
                        <div class="form-section-title" style="border-bottom-color: #bfdbfe;">
                            <i class="fas fa-user-shield" style="color: #2563eb;"></i>
                            <span style="color: #1e40af;">Tài khoản hệ thống</span>
                        </div>
                        <div class="form-grid">
                            <div class="portal-form-group">
                                <label style="color: #475569;">Tên đăng nhập (Username)</label>
                                <input type="text" id="addUsername" class="portal-input"
                                    placeholder="Nhập tên đăng nhập...">
                                <small style="color: #64748b; margin-top: 0.25rem; display: block;">Mặc định dùng Email
                                    nếu để trống</small>
                            </div>
                            <div class="portal-form-group">
                                <label style="color: #475569;">Mật khẩu (Password)</label>
                                <input type="password" id="addPassword" class="portal-input" placeholder="••••••••">
                            </div>
                        </div>
                    </div>

                    <div
                        style="display: flex; gap: 1rem; justify-content: flex-end; margin-top: 2rem; padding-top: 2rem; border-top: 1px solid #e2e8f0;">
                        <button class="btn-secondary" onclick="toggleAddEmployeeForm()" style="min-width: 120px;">Hủy
                            bỏ</button>
                        <button class="btn-primary" onclick="submitAddEmployee()" style="min-width: 150px;">
                            <i class="fas fa-check"></i> Lưu Nhân Viên
                        </button>
                    </div>
                </div>

                <!-- Filters -->
                <div class="filter-bar" style="margin-bottom: 2rem; display: flex; gap: 1rem; align-items: center;">
                    <div style="flex: 1; position: relative;">
                        <i class="fas fa-search"
                            style="position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: #94a3b8;"></i>
                        <input type="text" id="employeeSearchInput" placeholder="Tìm kiếm theo tên, email, chức vụ..."
                            style="width: 100%; padding: 0.75rem 1rem 0.75rem 2.5rem; border: 1px solid #e2e8f0; border-radius: 0.5rem; background: #f8fafc;">
                    </div>

                    <select id="departmentFilter" class="portal-select" style="max-width: 250px;">
                        <option value="all">Tất cả phòng ban</option>
                        <!-- Dynamic Loading -->
                    </select>

                    <button class="btn-secondary" onclick="exportToExcel()">
                        <i class="fas fa-download"></i> Xuất Excel
                    </button>
                </div>

                <!-- Employee List Card -->
                <div class="bg-card">
                    <div class="card-header" style="border-bottom: none; padding-bottom: 0;">
                        <h3>Danh sách nhân viên</h3>
                    </div>
                    <div class="table-responsive">
                        <table class="modern-table">
                            <thead>
                                <tr>
                                    <th>Nhân viên</th>
                                    <th>Liên hệ</th>
                                    <th>Phòng ban</th>
                                    <th>Chức vụ</th>
                                    <th>Ngày vào</th>
                                    <th>Trạng thái</th>
                                    <th></th>
                                </tr>
                            </thead>
                            <tbody id="employeeTableBody">
                                <!-- Static Data removed for dynamic loading -->
                            </tbody>
                        </table>
                    </div>
                    <div style="padding: 1rem; text-align: center; border-top: 1px solid #f1f5f9;">
                        <!-- Pagination placeholder if needed -->
                    </div>
                </div>

            </div>
        </main>
    </div>

    <!-- Modals (Xóa bỏ, thay bằng Inline Forms / Row Expansion) -->

    <script src="js/utils.js"></script>
    <script src="js/api-manager.js"></script>
    <script src="js/components.js"></script>
    <script src="js/pages/quanlynhanvien.js"></script>
</body>

</html>
