<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý Phòng Ban - HRM Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/shared-styles.css">
    <link rel="stylesheet" href="css/phongban.css">
</head>

<body>
    <div class="app-container">
        <!-- SIDEBAR -->
        <div id="sidebar-container"></div>

        <!-- MAIN CONTENT -->
        <main class="main-content">
            <!-- HEADER -->
            <div id="header-container"></div>

            <div class="content-wrapper">
                <!-- Page Title -->
                <div class="page-title-section"
                    style="display: flex; justify-content: space-between; align-items: center; max-width: 1200px; margin: 0 auto 2rem;">
                    <div>
                        <h1>Quản lý phòng ban</h1>
                        <p>Tổ chức và quản lý cơ cấu các phòng ban trong công ty</p>
                    </div>
                    <button class="btn-primary" onclick="toggleAddDeptForm()" id="toggleAddDeptBtn">
                        <i class="fas fa-plus"></i> <span id="toggleAddDeptBtnText">Thêm phòng ban</span>
                    </button>
                </div>

                <!-- INLINE ADD DEPARTMENT FORM -->
                <div id="addDeptFormContainer" class="form-premium-container" style="display: none;">
                    <div class="form-section">
                        <div class="form-section-title">
                            <i class="fas fa-building"></i>
                            <span>Thông tin cơ bản phòng ban</span>
                            <button onclick="toggleAddDeptForm()"
                                style="margin-left: auto; background: none; border: none; color: #94a3b8; cursor: pointer;">
                                <i class="fas fa-times"></i>
                            </button>
                        </div>
                        <div class="form-grid">
                            <div class="portal-form-group">
                                <label>Tên phòng ban *</label>
                                <input type="text" id="addDeptName" class="portal-input"
                                    placeholder="VD: Kỹ thuật, Nhân sự...">
                            </div>
                            <div class="portal-form-group">
                                <label>Trưởng phòng</label>
                                <select id="addDeptManager" class="portal-select">
                                    <option value="">-- Chọn trưởng phòng --</option>
                                </select>
                            </div>
                            <div class="portal-form-group">
                                <label>Email liên hệ</label>
                                <input type="email" id="addDeptEmail" class="portal-input"
                                    placeholder="VD: dept@company.com...">
                            </div>
                        </div>
                    </div>

                    <div class="form-section">
                        <div class="form-section-title">
                            <i class="fas fa-wallet"></i>
                            <span>Tài chính & Mô tả</span>
                        </div>
                        <div class="form-grid" style="grid-template-columns: 1fr 2fr;">
                            <div class="portal-form-group">
                                <label>Ngân sách dự tính (VNĐ)</label>
                                <input type="number" id="addDeptBudget" class="portal-input"
                                    placeholder="VD: 100000000...">
                            </div>
                            <div class="portal-form-group">
                                <label>Mô tả chức năng</label>
                                <textarea id="addDeptDesc" class="portal-textarea" rows="2"
                                    placeholder="Nhiệm vụ chính của phòng ban..."></textarea>
                            </div>
                        </div>
                    </div>

                    <div
                        style="display: flex; gap: 1rem; justify-content: flex-end; margin-top: 1rem; padding-top: 2rem; border-top: 1px solid #e2e8f0;">
                        <button class="btn-secondary" onclick="toggleAddDeptForm()" style="min-width: 120px;">Hủy
                            bỏ</button>
                        <button class="btn-primary" onclick="submitAddDept()" style="min-width: 160px;">
                            <i class="fas fa-check"></i> Lưu Phòng Ban
                        </button>
                    </div>
                </div>

                <!-- Stats Cards -->
                <div class="stats-grid" style="grid-template-columns: repeat(3, 1fr);">
                    <div class="stats-card">
                        <div class="stats-icon gradient-primary" style="background: #eff6ff; color: #2563eb;">
                            <i class="fas fa-building"></i>
                        </div>
                        <div class="stats-info">
                            <h3 class="stats-value">-</h3>
                            <p class="stats-label">Tổng phòng ban</p>
                        </div>
                    </div>
                    <div class="stats-card">
                        <div class="stats-icon gradient-success" style="background: #f0fdf4; color: #16a34a;">
                            <i class="fas fa-users"></i>
                        </div>
                        <div class="stats-info">
                            <h3 class="stats-value">-</h3>
                            <p class="stats-label">Tổng nhân viên</p>
                        </div>
                    </div>
                    <div class="stats-card">
                        <div class="stats-icon gradient-warning" style="background: #fff7ed; color: #ea580c;">
                            <i class="fas fa-chart-line"></i>
                        </div>
                        <div class="stats-info">
                            <h3 class="stats-value">-</h3>
                            <p class="stats-label">Tổng ngân sách</p>
                        </div>
                    </div>
                </div>

                <!-- Department Grid -->
                <div class="dept-grid">
                    <!-- Static Data removed for dynamic loading -->

                </div>

                <!-- TABLE FOR DEPARTMENTS -->
                <div class="bg-card" style="margin-top: 2rem;">
                    <div class="card-header" style="border-bottom: none; padding-bottom: 0;">
                        <h3>Danh sách các phòng ban</h3>
                    </div>
                    <div class="table-responsive">
                        <table class="modern-table">
                            <thead>
                                <tr>
                                    <th>Tên phòng ban</th>
                                    <th>Mô tả</th>
                                    <th>Trưởng phòng</th>
                                    <th>Nhân sự</th>
                                    <th>Ngân sách</th>
                                    <th>Trạng thái</th>
                                    <th></th>
                                </tr>
                            </thead>
                            <tbody id="departmentTable">
                                <!-- Dynamic rows go here -->
                            </tbody>
                        </table>
                    </div>
                    <div id="paginationContainer"
                        style="padding: 1rem; text-align: center; border-top: 1px solid #f1f5f9;">
                    </div>
                </div>
            </div>
        </main>
    </div>


    <script src="js/utils.js"></script>
    <script src="js/api-manager.js"></script>
    <script src="js/components.js"></script>
    <script src="js/pages/phongban.js"></script>
</body>

</html>
