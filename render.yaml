services:
  - type: web
    name: hr-system
    env: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: DATA_PATH
        value: /opt/render/project/src/data
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
    disk:
      name: hr-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
